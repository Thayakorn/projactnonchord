        body { box-sizing: border-box; }

        .falling-item {

            transition: transform 0.1s ease;
            z-index: 50;

        .wrong-effect { animation: wrongShake 0.5s ease-out; }

            0% { transform: scale(1); }
            50% { transform: scale(1.2); background: #22c55e; }
            100% { transform: scale(1); }
        }
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0); }
        }
        .fade-out { animation: fadeOut 0.3s ease-out forwards; }
        @keyframes scorePopup {

        body { overscroll-behavior: none; }

        let gameState = {
            score: 0,
            time: 30,
            maxTime: 30,
            combo: 0,
            isPlaying: false,
            fallingItems: [],
            spawnInterval: null,
            timerInterval: null
        };

        let itemIdCounter = 0;
        let draggedItem = null;
        
        // High Score Functions
        let currentSessionHighScore = 0; // สร้างตัวแปรเก็บสถิติแค่ชั่วคราว

        function loadHighScore() {
            return currentSessionHighScore; // คืนค่าจากตัวแปรแทน
        }

        function saveHighScore(score) {
            currentSessionHighScore = score; // บันทึกสถิติลงตัวแปร (ไม่เซฟลงเบราว์เซอร์แล้ว)
        }

        function updateHighScoreDisplay() {
            const highScoreEl = document.getElementById('highScore');
            highScoreEl.textContent = gameState.highScore;
        }

        const gameArea = document.getElementById('game-area');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const comboEl = document.getElementById('combo');
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const finalScoreEl = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const dropZones = document.querySelectorAll('.drop-zone');
        const gameoverIcon = document.getElementById('gameover-icon');

        function createFallingItem() {
            const nct = nctTypes[Math.floor(Math.random() * nctTypes.length)];
            const id = itemIdCounter++;
            
            const areaRect = gameArea.getBoundingClientRect();
            const isMobile = window.innerWidth < 768;
            const itemWidth = isMobile ? 100 : 140;
            
            const x = Math.random() * (areaRect.width - itemWidth - 20) + 10;
            
            const item = document.createElement('div');
            item.className = 'falling-item bg-white/95 rounded-xl p-2 md:p-3 shadow-xl border-2 border-purple-300/50';
            item.style.width = itemWidth + 'px';
            item.style.left = x + 'px';
            item.style.top = '-160px';
            item.dataset.id = id;
            item.dataset.type = nct.type;
            
            item.innerHTML = `
                <div class="h-14 md:h-20 flex items-center justify-center">
                    ${nct.svg}
                </div>
            `;
            
            gameArea.appendChild(item);
            
            const itemData = {
                id,
                element: item,
                type: nct.type,
                x,
                y: -160,
                speed: (0.5 + Math.random() * 0.3) * (isMobile ? 0.8 : 1)
            };
            
            gameState.fallingItems.push(itemData);
            
            item.addEventListener('mousedown', startDrag);
            item.addEventListener('touchstart', startDrag, { passive: false });
        }

        function startDrag(e) {
            if (!gameState.isPlaying) return;
            
            e.preventDefault();
            const item = e.currentTarget;
            draggedItem = gameState.fallingItems.find(i => i.id === parseInt(item.dataset.id));
            
            if (!draggedItem) return;
            
            item.classList.add('dragging');
            
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            const rect = item.getBoundingClientRect();
            const areaRect = gameArea.getBoundingClientRect();
            
            const offsetX = clientX - rect.left;
            const offsetY = clientY - rect.top;
            
            function onMove(moveEvent) {
                if (!draggedItem) return;
                
                const moveX = moveEvent.clientX || (moveEvent.touches && moveEvent.touches[0].clientX);
                const moveY = moveEvent.clientY || (moveEvent.touches && moveEvent.touches[0].clientY);
                
                draggedItem.element.style.left = (moveX - areaRect.left - offsetX) + 'px';
                draggedItem.element.style.top = (moveY - areaRect.top - offsetY) + 'px';
                
                dropZones.forEach(zone => {
                    const zoneRect = zone.getBoundingClientRect();
                    if (moveX >= zoneRect.left && moveX <= zoneRect.right &&
                        moveY >= zoneRect.top && moveY <= zoneRect.bottom) {
                        zone.classList.add('highlight');
                    } else {
                        zone.classList.remove('highlight');
                    }
                });
            }
            
            function onEnd(endEvent) {
                if (!draggedItem) return;
                
                item.classList.remove('dragging');
                
                const endX = endEvent.clientX || (endEvent.changedTouches && endEvent.changedTouches[0].clientX);
                const endY = endEvent.clientY || (endEvent.changedTouches && endEvent.changedTouches[0].clientY);
                
                let droppedCorrectly = false;
                
                dropZones.forEach(zone => {
                    zone.classList.remove('highlight');
                    const zoneRect = zone.getBoundingClientRect();
                    
                    if (endX >= zoneRect.left && endX <= zoneRect.right &&
                        endY >= zoneRect.top && endY <= zoneRect.bottom) {
                        droppedCorrectly = true;
                        
                        if (zone.dataset.answer === draggedItem.type) {
                            handleCorrectAnswer(zone, item);
                        } else {
                            handleWrongAnswer(zone, item);
                        }
                    }
                });
                
                if (!droppedCorrectly) {
                    item.style.position = 'absolute';
                    item.style.left = draggedItem.x + 'px';
                    item.style.top = draggedItem.y + 'px';
                }
                
                draggedItem = null;
                
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
            }
            
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd);
        }

        function handleCorrectAnswer(zone, item) {
            gameState.score += 10 + gameState.combo * 2;
            gameState.combo++;
            gameState.time = Math.min(gameState.maxTime, gameState.time + 2);
            
            zone.classList.add('correct-effect');
            item.classList.add('fade-out');
            
            showScorePopup(item, '+' + (10 + (gameState.combo - 1) * 2), '#22c55e');
            showScorePopup(zone, '+2s', '#22d3ee');
            
            setTimeout(() => {
                zone.classList.remove('correct-effect');
            }, 500);
            
            const itemId = parseInt(item.dataset.id);
            setTimeout(() => {
                item.remove();
                gameState.fallingItems = gameState.fallingItems.filter(i => i.id !== itemId);
            }, 300);
            
            updateStats();
        }

        function handleWrongAnswer(zone, item) {
            gameState.combo = 0;
            gameState.maxTime = Math.max(5, gameState.maxTime - 2);
            gameState.time = Math.max(0, gameState.time - 2);
            
            zone.classList.add('wrong-effect');
            showScorePopup(zone, '-2s', '#ef4444');
            
            setTimeout(() => {
                zone.classList.remove('wrong-effect');
            }, 500);
            
            item.classList.add('fade-out');
            const itemId = parseInt(item.dataset.id);
            setTimeout(() => {
                item.remove();
                gameState.fallingItems = gameState.fallingItems.filter(i => i.id !== itemId);
            }, 300);
            
            updateStats();
        }

        function showScorePopup(element, text, color) {
            const popup = document.createElement('div');
            popup.className = 'score-popup absolute text-2xl font-bold pointer-events-none';
            popup.style.color = color;
            popup.style.left = '50%';
            popup.style.top = '50%';
            popup.style.transform = 'translate(-50%, -50%)';
            popup.style.zIndex = '1000';
            popup.textContent = text;
            
            element.style.position = 'relative';
            element.appendChild(popup);
            
            setTimeout(() => popup.remove(), 800);
        }

        function updateStats() {
            scoreEl.textContent = gameState.score;
            timerEl.textContent = Math.ceil(gameState.time);
            comboEl.textContent = gameState.combo;
            
            if (gameState.time <= 5) {
                timerEl.classList.remove('text-cyan-400');
                timerEl.classList.add('text-red-400');
            } else if (gameState.time <= 10) {
                timerEl.classList.remove('text-cyan-400', 'text-red-400');
                timerEl.classList.add('text-yellow-400');
            } else {
                timerEl.classList.remove('text-red-400', 'text-yellow-400');
                timerEl.classList.add('text-cyan-400');
            }
        }

        function gameLoop() {
            if (!gameState.isPlaying) return;
            
            const areaRect = gameArea.getBoundingClientRect();
            
            gameState.fallingItems.forEach(item => {
                if (draggedItem && draggedItem.id === item.id) return;
                
                item.y += item.speed;
                item.element.style.top = item.y + 'px';
                
                if (item.y > areaRect.height + 50) {
                    item.element.remove();
                    gameState.fallingItems = gameState.fallingItems.filter(i => i.id !== item.id);
                    gameState.combo = 0;
                    updateStats();
                }
            });
            
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameState.score = 0;
            gameState.time = 30;
            gameState.maxTime = 30;
            gameState.combo = 0;
            gameState.isPlaying = true;
            gameState.fallingItems = [];
            gameState.highScore = loadHighScore();
            
            gameArea.querySelectorAll('.falling-item').forEach(el => el.remove());
            
            startScreen.classList.add('hidden');
            gameoverScreen.classList.add('hidden');
            
            updateStats();
            updateHighScoreDisplay();
            
            createFallingItem();
            gameState.spawnInterval = setInterval(() => {
                if (gameState.isPlaying && gameState.fallingItems.length < 3) {
                    createFallingItem();
                }
            }, 2000);
            
            gameLoop();
            
            gameState.timerInterval = setInterval(() => {
                if (!gameState.isPlaying) return;
                
                gameState.time -= 0.1;
                updateStats();
                
                if (gameState.time <= 0) {
                    endGame();
                }
            }, 100);
        }

        function endGame() {
            gameState.isPlaying = false;
            
            clearInterval(gameState.spawnInterval);
            clearInterval(gameState.timerInterval);

            // เซ็ตกลับเป็นถ้วยรางวัลปกติเป็นค่าเริ่มต้น
            gameoverIcon.innerHTML = '🏆';
            gameoverIcon.className = 'text-6xl mb-4 transition-all duration-300';

            // ตรวจสอบสถิติใหม่ (ทำลายสถิติเมื่อคะแนนมากกว่าสถิติเดิม และคะแนนต้องมากกว่า 0)
            if (gameState.score > 0 && gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                saveHighScore(gameState.highScore);
                updateHighScoreDisplay();
                
                // เปลี่ยนไอคอนถ้วย เป็นข้อความทำลายสถิติใหม่
                gameoverIcon.innerHTML = '🎉 ทำลายสถิติใหม่! 🎉';
                gameoverIcon.className = 'text-xl md:text-3xl mb-4 font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 animate-pulse drop-shadow-lg';
            }
            
            finalScoreEl.textContent = gameState.score;
            gameoverScreen.classList.remove('hidden');
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

    </script>
